basePath: /api/backend
definitions:
  internal_handler_admin.LoginReq:
    properties:
      code:
        description: Vben 登录组件里的验证码字段名可能是 code，这里一并接住。
        type: string
      google_code:
        example: "123456"
        type: string
      password:
        example: admin123
        type: string
      username:
        example: admin
        type: string
    type: object
  internal_handler_admin.createAdminReq:
    properties:
      nickname:
        type: string
      password:
        type: string
      role:
        type: integer
      status:
        type: integer
      username:
        type: string
    type: object
  internal_handler_admin.createRoleReq:
    properties:
      name:
        type: string
    type: object
  internal_handler_admin.deleteAdminReq:
    properties:
      id:
        type: integer
    type: object
  internal_handler_admin.deleteRoleReq:
    properties:
      id:
        type: integer
    type: object
  internal_handler_admin.savePermissionReq:
    properties:
      id:
        type: integer
      permission_list:
        type: string
      site_id:
        type: integer
    type: object
  internal_handler_admin.updateAdminReq:
    properties:
      id:
        type: integer
      nickname:
        type: string
      password:
        type: string
      role_id:
        type: integer
      status:
        type: integer
      username:
        type: string
    type: object
  internal_handler_admin.updateRoleReq:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  yhdm_service_internal_response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  yhdm_service_internal_service.AdminListItem:
    properties:
      created_at:
        description: ← created_at 格式化
        type: string
      id:
        type: integer
      last_login_ip:
        description: ← login_ip
        type: string
      last_login_time:
        description: ← login_at 格式化
        type: string
      nickname:
        description: ← real_name
        type: string
      role:
        description: ← 角色名（role_id=0 为超级管理员）
        type: string
      status:
        description: ← is_disabled 取反：1 启用 / 0 禁用
        type: integer
      switch_google2fa:
        description: ← 有 google_code 为 1
        type: integer
      username:
        type: string
    type: object
  yhdm_service_internal_service.AdminListResult:
    properties:
      list:
        items:
          $ref: '#/definitions/yhdm_service_internal_service.AdminListItem'
        type: array
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  yhdm_service_internal_service.MenuItem:
    properties:
      children:
        items:
          $ref: '#/definitions/yhdm_service_internal_service.MenuItem'
        type: array
      icon:
        type: string
      id:
        type: integer
      name:
        type: string
      path:
        type: string
      sort:
        type: integer
      type:
        description: 前端只渲染 type==1 的节点
        type: integer
    type: object
  yhdm_service_internal_service.RoleOption:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  yhdm_service_internal_service.UserInfo:
    properties:
      avatar:
        type: string
      id:
        type: integer
      permissions:
        items:
          type: string
        type: array
      realName:
        type: string
      roles:
        items:
          type: string
        type: array
      username:
        type: string
    type: object
info:
  contact: {}
  description: 樱花动漫后台服务 API（由 PHP/Phalcon 迁移至 Go/Gin）。
  title: yhdm_service API
  version: "1.0"
paths:
  /app/admins:
    get:
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: size
        type: integer
      - description: 用户名模糊筛选
        in: query
        name: username
        type: string
      - description: 状态筛选:1启用/0禁用
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  $ref: '#/definitions/yhdm_service_internal_service.AdminListResult'
              type: object
      security:
      - BearerAuth: []
      summary: 管理员列表(分页)
      tags:
      - 系统管理-管理员
  /app/create-admin:
    post:
      consumes:
      - application/json
      parameters:
      - description: 管理员信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.createAdminReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {id, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 新增管理员
      tags:
      - 系统管理-管理员
  /app/create-role:
    post:
      consumes:
      - application/json
      parameters:
      - description: 角色名
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.createRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {id, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 新增角色
      tags:
      - 系统管理-角色
  /app/delete-admin:
    post:
      consumes:
      - application/json
      parameters:
      - description: 管理员ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.deleteAdminReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {success, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 删除管理员
      tags:
      - 系统管理-管理员
  /app/delete-role:
    post:
      consumes:
      - application/json
      parameters:
      - description: 角色ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.deleteRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {success, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 删除角色
      tags:
      - 系统管理-角色
  /app/get-info:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  $ref: '#/definitions/yhdm_service_internal_service.UserInfo'
              type: object
      security:
      - BearerAuth: []
      summary: 获取当前登录管理员信息
      tags:
      - 认证
  /app/login:
    post:
      consumes:
      - application/json
      description: 用户名+密码(+谷歌验证码)登录，成功返回 JWT。dev 模式跳过 2FA。
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.LoginReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {token, socket}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      summary: 后台管理员登录
      tags:
      - 认证
  /app/menus:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/yhdm_service_internal_service.MenuItem'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 获取当前管理员可见的菜单树
      tags:
      - 认证
  /app/options-admin-role:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/yhdm_service_internal_service.RoleOption'
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 角色下拉选项
      tags:
      - 系统管理-管理员
  /app/permissions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {list:[PermissionNode]}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 权限树(用于给角色分配权限)
      tags:
      - 系统管理-角色
  /app/roles:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {list:[RoleListItem]}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 角色列表
      tags:
      - 系统管理-角色
  /app/save-permission:
    post:
      consumes:
      - application/json
      parameters:
      - description: 角色ID与权限列表(逗号分隔)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.savePermissionReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {success, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 保存角色权限
      tags:
      - 系统管理-角色
  /app/update-admin:
    post:
      consumes:
      - application/json
      parameters:
      - description: 管理员信息(password 为空则不改密码)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.updateAdminReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {success, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 更新管理员
      tags:
      - 系统管理-管理员
  /app/update-role:
    post:
      consumes:
      - application/json
      parameters:
      - description: 角色ID与名称
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler_admin.updateRoleReq'
      produces:
      - application/json
      responses:
        "200":
          description: 'data: {success, message}'
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  type: object
              type: object
      security:
      - BearerAuth: []
      summary: 更新角色名
      tags:
      - 系统管理-角色
  /auth/codes:
    get:
      description: 超级管理员返回 ["*"]
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/yhdm_service_internal_response.Body'
            - properties:
                data:
                  items:
                    type: string
                  type: array
              type: object
      security:
      - BearerAuth: []
      summary: 获取当前管理员的权限码(按钮级)
      tags:
      - 认证
  /logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/yhdm_service_internal_response.Body'
      summary: 退出登录
      tags:
      - 认证
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
